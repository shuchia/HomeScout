name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod

concurrency:
  group: deploy-backend-${{ github.event.inputs.environment || 'dev' }}

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: snugd-backend

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: |
          ENV=${{ github.event.inputs.environment || 'dev' }}
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "image_tag=${ENV}-${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        run: |
          IMAGE=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}
          docker build -t $IMAGE ./backend
          docker push $IMAGE

  deploy-dev:
    name: Deploy to Dev
    needs: build-and-push
    if: github.event.inputs.environment == 'dev' || github.event.inputs.environment == '' || github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Run Alembic migrations
        run: |
          SUBNETS='${{ secrets.DEV_PRIVATE_SUBNETS }}'
          SUBNET_JSON=$(echo "$SUBNETS" | tr ',' '\n' | sed 's/.*/"&"/' | paste -sd, -)
          TASK_ARN=$(aws ecs run-task \
            --cluster snugd-dev \
            --task-definition snugd-dev-api \
            --launch-type FARGATE \
            --network-configuration "{\"awsvpcConfiguration\":{\"subnets\":[${SUBNET_JSON}],\"securityGroups\":[\"${{ secrets.DEV_ECS_SG }}\"],\"assignPublicIp\":\"DISABLED\"}}" \
            --overrides '{"containerOverrides":[{"name":"api","environment":[{"name":"SERVICE_TYPE","value":"migrate"}]}]}' \
            --query 'tasks[0].taskArn' \
            --output text)
          echo "Waiting for migration task: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster snugd-dev --tasks "$TASK_ARN"

      - name: Update task definitions with new image
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          REGISTRY=$(aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} --query 'repositories[0].repositoryUri' --output text)
          NEW_IMAGE="${REGISTRY}:${IMAGE_TAG}"
          echo "Updating task definitions to use image: $NEW_IMAGE"

          for TASK_DEF in snugd-dev-api snugd-dev-worker snugd-dev-beat; do
            # Get current task definition
            CURRENT=$(aws ecs describe-task-definition --task-definition $TASK_DEF --query 'taskDefinition' --output json)

            # Update the container image in the definition
            UPDATED=$(echo "$CURRENT" | python3 -c "
          import sys, json
          td = json.load(sys.stdin)
          for c in td['containerDefinitions']:
              c['image'] = '$NEW_IMAGE'
          # Keep only fields needed for register-task-definition
          keep = ['family','containerDefinitions','taskRoleArn','executionRoleArn','networkMode','volumes','placementConstraints','requiresCompatibilities','cpu','memory','runtimePlatform']
          out = {k: td[k] for k in keep if k in td}
          print(json.dumps(out))
          ")

            # Register new revision
            aws ecs register-task-definition --cli-input-json "$UPDATED" --no-cli-pager > /dev/null
            echo "Updated $TASK_DEF"
          done

      - name: Deploy ECS services
        run: |
          for SERVICE in api worker beat; do
            aws ecs update-service \
              --cluster snugd-dev \
              --service $SERVICE \
              --force-new-deployment \
              --no-cli-pager
          done

      - name: Wait for API service stability
        run: |
          aws ecs wait services-stable \
            --cluster snugd-dev \
            --services api

      - name: Smoke test
        run: |
          sleep 10
          curl -sf https://api-dev.snugd.ai/health || exit 1
          echo "Smoke test passed"

  deploy-qa:
    name: Deploy to QA
    needs: build-and-push
    if: github.event.inputs.environment == 'qa'
    runs-on: ubuntu-latest
    environment: qa

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Retag image for QA
        run: |
          REGISTRY=$(aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} --query 'repositories[0].repositoryUri' --output text)
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          # Pull the dev image and retag as qa
          docker pull ${REGISTRY}:dev-${SHA}
          docker tag ${REGISTRY}:dev-${SHA} ${REGISTRY}:qa-${SHA}
          docker push ${REGISTRY}:qa-${SHA}

      - name: Run Alembic migrations
        run: |
          SUBNETS='${{ secrets.QA_PRIVATE_SUBNETS }}'
          SUBNET_JSON=$(echo "$SUBNETS" | tr ',' '\n' | sed 's/.*/"&"/' | paste -sd, -)
          TASK_ARN=$(aws ecs run-task \
            --cluster snugd-qa \
            --task-definition snugd-qa-api \
            --launch-type FARGATE \
            --network-configuration "{\"awsvpcConfiguration\":{\"subnets\":[${SUBNET_JSON}],\"securityGroups\":[\"${{ secrets.QA_ECS_SG }}\"],\"assignPublicIp\":\"DISABLED\"}}" \
            --overrides '{"containerOverrides":[{"name":"api","environment":[{"name":"SERVICE_TYPE","value":"migrate"}]}]}' \
            --query 'tasks[0].taskArn' \
            --output text)
          echo "Waiting for migration task: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster snugd-qa --tasks "$TASK_ARN"

      - name: Update task definitions with new image
        run: |
          REGISTRY=$(aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} --query 'repositories[0].repositoryUri' --output text)
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          NEW_IMAGE="${REGISTRY}:qa-${SHA}"

          for TASK_DEF in snugd-qa-api snugd-qa-worker snugd-qa-beat; do
            CURRENT=$(aws ecs describe-task-definition --task-definition $TASK_DEF --query 'taskDefinition' --output json)
            UPDATED=$(echo "$CURRENT" | python3 -c "
          import sys, json
          td = json.load(sys.stdin)
          for c in td['containerDefinitions']:
              c['image'] = '$NEW_IMAGE'
          keep = ['family','containerDefinitions','taskRoleArn','executionRoleArn','networkMode','volumes','placementConstraints','requiresCompatibilities','cpu','memory','runtimePlatform']
          out = {k: td[k] for k in keep if k in td}
          print(json.dumps(out))
          ")
            aws ecs register-task-definition --cli-input-json "$UPDATED" --no-cli-pager > /dev/null
            echo "Updated $TASK_DEF"
          done

      - name: Deploy ECS services
        run: |
          for SERVICE in api worker beat; do
            aws ecs update-service \
              --cluster snugd-qa \
              --service $SERVICE \
              --force-new-deployment \
              --no-cli-pager
          done

      - name: Wait for stability
        run: aws ecs wait services-stable --cluster snugd-qa --services api

      - name: Smoke test
        run: |
          sleep 10
          curl -sf https://api-qa.snugd.ai/health || exit 1

  deploy-prod:
    name: Deploy to Prod
    needs: build-and-push
    if: github.event.inputs.environment == 'prod'
    runs-on: ubuntu-latest
    environment:
      name: prod
      # GitHub Environment protection rules enforce manual approval

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Retag image for Prod
        run: |
          REGISTRY=$(aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} --query 'repositories[0].repositoryUri' --output text)
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          docker pull ${REGISTRY}:qa-${SHA}
          docker tag ${REGISTRY}:qa-${SHA} ${REGISTRY}:prod-${SHA}
          docker push ${REGISTRY}:prod-${SHA}

      - name: Run Alembic migrations
        run: |
          SUBNETS='${{ secrets.PROD_PRIVATE_SUBNETS }}'
          SUBNET_JSON=$(echo "$SUBNETS" | tr ',' '\n' | sed 's/.*/"&"/' | paste -sd, -)
          TASK_ARN=$(aws ecs run-task \
            --cluster snugd-prod \
            --task-definition snugd-prod-api \
            --launch-type FARGATE \
            --network-configuration "{\"awsvpcConfiguration\":{\"subnets\":[${SUBNET_JSON}],\"securityGroups\":[\"${{ secrets.PROD_ECS_SG }}\"],\"assignPublicIp\":\"DISABLED\"}}" \
            --overrides '{"containerOverrides":[{"name":"api","environment":[{"name":"SERVICE_TYPE","value":"migrate"}]}]}' \
            --query 'tasks[0].taskArn' \
            --output text)
          echo "Waiting for migration task: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster snugd-prod --tasks "$TASK_ARN"

      - name: Update task definitions with new image
        run: |
          REGISTRY=$(aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} --query 'repositories[0].repositoryUri' --output text)
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          NEW_IMAGE="${REGISTRY}:prod-${SHA}"

          for TASK_DEF in snugd-prod-api snugd-prod-worker snugd-prod-beat; do
            CURRENT=$(aws ecs describe-task-definition --task-definition $TASK_DEF --query 'taskDefinition' --output json)
            UPDATED=$(echo "$CURRENT" | python3 -c "
          import sys, json
          td = json.load(sys.stdin)
          for c in td['containerDefinitions']:
              c['image'] = '$NEW_IMAGE'
          keep = ['family','containerDefinitions','taskRoleArn','executionRoleArn','networkMode','volumes','placementConstraints','requiresCompatibilities','cpu','memory','runtimePlatform']
          out = {k: td[k] for k in keep if k in td}
          print(json.dumps(out))
          ")
            aws ecs register-task-definition --cli-input-json "$UPDATED" --no-cli-pager > /dev/null
            echo "Updated $TASK_DEF"
          done

      - name: Deploy ECS services
        run: |
          for SERVICE in api worker beat; do
            aws ecs update-service \
              --cluster snugd-prod \
              --service $SERVICE \
              --force-new-deployment \
              --no-cli-pager
          done

      - name: Wait for stability
        run: aws ecs wait services-stable --cluster snugd-prod --services api

      - name: Smoke test
        run: |
          sleep 10
          curl -sf https://api.snugd.ai/health || exit 1
