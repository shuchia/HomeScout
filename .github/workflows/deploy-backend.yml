name: Deploy Backend

on:
  push:
    branches: [main, release/qa, release/prod]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: snugd-backend

jobs:
  # Determine which environment to deploy based on branch or manual input
  resolve-env:
    name: Resolve Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
    steps:
      - name: Resolve environment from branch or input
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/release/prod" ]; then
            echo "environment=prod" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/release/qa" ]; then
            echo "environment=qa" >> "$GITHUB_OUTPUT"
          else
            echo "environment=dev" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    name: Build & Push Docker Image
    needs: resolve-env
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      environment: ${{ needs.resolve-env.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: |
          ENV=${{ needs.resolve-env.outputs.environment }}
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "image_tag=${ENV}-${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        run: |
          IMAGE=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}
          docker build -t $IMAGE ./backend
          docker push $IMAGE

  deploy:
    name: Deploy to ${{ needs.resolve-env.outputs.environment }}
    needs: [resolve-env, build-and-push]
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-env.outputs.environment }}
    concurrency:
      group: deploy-backend-${{ needs.resolve-env.outputs.environment }}

    env:
      ENV: ${{ needs.resolve-env.outputs.environment }}
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update task definitions with new image
        run: |
          REGISTRY=$(aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} --query 'repositories[0].repositoryUri' --output text)
          NEW_IMAGE="${REGISTRY}:${IMAGE_TAG}"
          echo "Updating task definitions to use image: $NEW_IMAGE"

          for TASK_DEF in snugd-${ENV}-api snugd-${ENV}-worker snugd-${ENV}-beat; do
            CURRENT=$(aws ecs describe-task-definition --task-definition $TASK_DEF --query 'taskDefinition' --output json)
            UPDATED=$(echo "$CURRENT" | python3 -c "
          import sys, json
          td = json.load(sys.stdin)
          for c in td['containerDefinitions']:
              c['image'] = '$NEW_IMAGE'
          keep = ['family','containerDefinitions','taskRoleArn','executionRoleArn','networkMode','volumes','placementConstraints','requiresCompatibilities','cpu','memory','runtimePlatform']
          out = {k: td[k] for k in keep if k in td}
          print(json.dumps(out))
          ")
            aws ecs register-task-definition --cli-input-json "$UPDATED" --no-cli-pager > /dev/null
            echo "Updated $TASK_DEF"
          done

      - name: Run Alembic migrations
        run: |
          # Select secrets based on environment
          case "$ENV" in
            dev)  SUBNETS='${{ secrets.DEV_PRIVATE_SUBNETS }}'; SG='${{ secrets.DEV_ECS_SG }}' ;;
            qa)   SUBNETS='${{ secrets.QA_PRIVATE_SUBNETS }}'; SG='${{ secrets.QA_ECS_SG }}' ;;
            prod) SUBNETS='${{ secrets.PROD_PRIVATE_SUBNETS }}'; SG='${{ secrets.PROD_ECS_SG }}' ;;
          esac
          SUBNET_JSON=$(echo "$SUBNETS" | tr ',' '\n' | sed 's/.*/"&"/' | paste -sd, -)

          MAX_RETRIES=3
          for ATTEMPT in $(seq 1 $MAX_RETRIES); do
            echo "Migration attempt $ATTEMPT/$MAX_RETRIES"
            TASK_ARN=$(aws ecs run-task \
              --cluster snugd-${ENV} \
              --task-definition snugd-${ENV}-api \
              --launch-type FARGATE \
              --network-configuration "{\"awsvpcConfiguration\":{\"subnets\":[${SUBNET_JSON}],\"securityGroups\":[\"${SG}\"],\"assignPublicIp\":\"DISABLED\"}}" \
              --overrides '{"containerOverrides":[{"name":"api","environment":[{"name":"SERVICE_TYPE","value":"migrate"}]}]}' \
              --query 'tasks[0].taskArn' \
              --output text)
            echo "Migration task ARN: $TASK_ARN"

            aws ecs wait tasks-stopped --cluster snugd-${ENV} --tasks "$TASK_ARN"

            TASK_INFO=$(aws ecs describe-tasks --cluster snugd-${ENV} --tasks "$TASK_ARN" \
              --query 'tasks[0].{exit:containers[0].exitCode,reason:stoppedReason,status:containers[0].lastStatus}' \
              --output json)
            echo "Task result: $TASK_INFO"

            EXIT_CODE=$(echo "$TASK_INFO" | python3 -c "import sys,json; print(json.load(sys.stdin).get('exit','null'))")

            if [ "$EXIT_CODE" = "0" ]; then
              echo "Migration completed successfully"
              break
            fi

            echo "Migration failed (exit=$EXIT_CODE)"
            if [ "$ATTEMPT" -lt "$MAX_RETRIES" ]; then
              echo "Retrying in 15 seconds..."
              sleep 15
            else
              echo "::error::Migration failed after $MAX_RETRIES attempts"
              exit 1
            fi
          done

      - name: Deploy ECS services
        run: |
          for SERVICE in api worker beat; do
            aws ecs update-service \
              --cluster snugd-${ENV} \
              --service $SERVICE \
              --task-definition snugd-${ENV}-${SERVICE} \
              --force-new-deployment \
              --no-cli-pager
          done

      - name: Wait for API service stability
        run: aws ecs wait services-stable --cluster snugd-${ENV} --services api

      - name: Smoke tests
        run: |
          sleep 10
          chmod +x scripts/smoke-test.sh
          ./scripts/smoke-test.sh $ENV

      - name: Run E2E tests against QA
        if: env.ENV == 'qa'
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npx playwright test --project=chromium
        env:
          NEXT_PUBLIC_API_URL: https://api-qa.snugd.ai
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.QA_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.QA_SUPABASE_ANON_KEY }}
          BASE_URL: https://qa.snugd.ai
